name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          # No go.sum yet; the module cache holds only golangci-lint, keyed by its pin in the Makefile.
          cache-dependency-path: Makefile
      - run: make lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false # nothing to cache until go.sum exists
      - run: make test

  # Real-engine drills in containers (build tag: integration). Needs Docker; borg tests skip if borg is absent.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false # nothing to cache until go.sum exists
      - run: make test-integration

  # The sabotage kit (build tag: sabotage): every fixture must be flagged. Engine fixtures need Docker + borg.
  sabotage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false # nothing to cache until go.sum exists
      - run: make test-sabotage
